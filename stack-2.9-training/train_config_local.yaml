# Stack 2.9 Training Configuration - Local/MPS Optimized

# Model Configuration
model:
  name: "./base_model_qwen7b"
  trust_remote_code: true
  torch_dtype: "float16"

# Data Configuration
data:
  input_path: "/Users/walidsobhi/.openclaw/workspace/stack-2.9/training-data/generated/synthetic_50k.jsonl"
  train_dir: "/Users/walidsobhi/.openclaw/workspace/stack-2.9-training/data/train"
  eval_dir: "/Users/walidsobhi/.openclaw/workspace/stack-2.9-training/data/eval"
  max_length: 2048
  train_split: 0.9
  test_split: 0.1

# LoRA Configuration
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# Training Configuration
training:
  num_epochs: 1
  batch_size: 1
  gradient_accumulation: 4
  learning_rate: 2.0e-4
  warmup_steps: 50
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 5
  eval_steps: 100
  save_steps: 200
  save_total_limit: 2
  fp16: true
  bf16: false
  gradient_checkpointing: true

# Output Configuration
output:
  lora_dir: "/Users/walidsobhi/.openclaw/workspace/stack-2.9-training/output/stack-2.9-7b-lora"
  merged_dir: "/Users/walidsobhi/.openclaw/workspace/stack-2.9-training/output/stack-2.9-7b-merged"
  awq_dir: "/Users/walidsobhi/.openclaw/workspace/stack-2.9-training/output/stack-2.9-7b-awq"

# Quantization Configuration  
quantization:
  enabled: false
  bits: 4
  group_size: 128

# Logging Configuration
logging:
  report_to: "none"
  wandb_project: "stack-2.9-training"
  run_name: null

# Hardware Configuration  
hardware:
  device: "mps"
  num_gpus: 0
  use_4bit: false
  use_8bit: false