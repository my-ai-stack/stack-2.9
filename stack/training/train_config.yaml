# Stack 2.9 Training Configuration
# Supports multiple model scales (7B, 32B)

# Model Configuration
model:
  # For 7B: "Qwen/Qwen2.5-Coder-7B"
  # For 32B: "Qwen/Qwen2.5-Coder-32B"
  name: "Qwen/Qwen2.5-Coder-32B"
  trust_remote_code: true
  torch_dtype: "bfloat16"

# Data Configuration
data:
  train_files:
    - "/Users/walidsobhi/.openclaw/workspace/stack-2.9/training-data/final/train.jsonl"
  val_file: "/Users/walidsobhi/.openclaw/workspace/stack-2.9/training-data/final/val.jsonl"
  test_file: "/Users/walidsobhi/.openclaw/workspace/stack-2.9/training-data/final/test.jsonl"
  train_dir: "/Users/walidsobhi/.openclaw/workspace/stack-2.9-training/data/train"
  eval_dir: "/Users/walidsobhi/.openclaw/workspace/stack-2.9-training/data/eval"
  max_length: 4096  # Recommended 4096 for 32B, can be 8192 for 7B on A100
  train_split: 0.9
  test_split: 0.1

# LoRA Configuration
lora:
  # Recommended for 7B: r=16, alpha=32
  # Recommended for 32B: r=64, alpha=128
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# Training Configuration
training:
  num_epochs: 3
  batch_size: 1 # Use 1 for 32B, can be 2-4 for 7B on A100
  gradient_accumulation: 16 # Adjust to maintain effective batch size
  learning_rate: 1.0e-4
  warmup_steps: 100
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 10
  eval_steps: 500
  save_steps: 1000
  save_total_limit: 3
  fp16: false
  bf16: true
  gradient_checkpointing: true
  optim: "adamw_torch"

# Output Configuration
output:
  lora_dir: "/Users/walidsobhi/.openclaw/workspace/stack-2.9-training/output/stack-2.9-lora"
  merged_dir: "/Users/walidsobhi/.openclaw/workspace/stack-2.9-training/output/stack-2.9-merged"
  awq_dir: "/Users/walidsobhi/.openclaw/workspace/stack-2.9-training/output/stack-2.9-awq"

# Quantization Configuration
quantization:
  enabled: true # Enable 4-bit for 32B or memory-constrained 7B
  bits: 4
  group_size: 128

# Logging Configuration
logging:
  report_to: "none"
  wandb_project: "stack-2.9-training"
  run_name: null

# Hardware Configuration
hardware:
  device: "cuda"
  num_gpus: 1
  use_4bit: true
  use_8bit: false

# Merge Configuration
merge:
  enabled: true
  output_dir: "/Users/walidsobhi/.openclaw/workspace/stack-2.9-training/output/stack-2.9-merged"
