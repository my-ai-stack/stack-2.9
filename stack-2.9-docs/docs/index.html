<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack 2.9 Documentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-light: #eef2ff;
            --border: #e2e8f0;
            --code-bg: #f1f5f9;
            --code-text: #1e293b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --sidebar-width: 280px;
            --header-height: 60px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --accent: #818cf8;
            --accent-hover: #a5b4fc;
            --accent-light: #1e1b4b;
            --border: #334155;
            --code-bg: #1e293b;
            --code-text: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(var(--bg-primary), 0.9);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* Search */
        .search-container {
            position: relative;
        }

        .search-input {
            width: 300px;
            height: 40px;
            padding: 0 16px 0 44px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-results {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            max-height: 400px;
            overflow-y: auto;
            display: none;
            z-index: 200;
        }

        .search-results.active {
            display: block;
        }

        .search-result-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s ease;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover {
            background: var(--bg-tertiary);
        }

        .search-result-title {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .search-result-preview {
            font-size: 13px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .search-result-section {
            font-size: 11px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        /* Theme Toggle */
        .theme-toggle {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        /* Layout */
        .layout {
            display: flex;
            padding-top: var(--header-height);
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            position: fixed;
            top: var(--header-height);
            left: 0;
            bottom: 0;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 24px 0;
        }

        .sidebar-section {
            margin-bottom: 24px;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            padding: 0 24px;
            margin-bottom: 8px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 24px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s ease;
            border-left: 3px solid transparent;
        }

        .sidebar-link:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        .sidebar-link.active {
            color: var(--accent);
            background: var(--accent-light);
            border-left-color: var(--accent);
        }

        .sidebar-link-icon {
            width: 18px;
            height: 18px;
            opacity: 0.7;
        }

        .sidebar-link.active .sidebar-link-icon {
            opacity: 1;
        }

        /* Main Content */
        .main {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 48px;
            max-width: 1200px;
        }

        .content {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 48px;
            box-shadow: var(--shadow-sm);
        }

        .content h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .content h2 {
            font-size: 24px;
            font-weight: 600;
            margin: 32px 0 16px;
            color: var(--text-primary);
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .content h3 {
            font-size: 18px;
            font-weight: 600;
            margin: 24px 0 12px;
            color: var(--text-primary);
        }

        .content p {
            margin-bottom: 16px;
            color: var(--text-secondary);
        }

        .content ul, .content ol {
            margin-bottom: 16px;
            padding-left: 24px;
            color: var(--text-secondary);
        }

        .content li {
            margin-bottom: 8px;
        }

        .content a {
            color: var(--accent);
            text-decoration: none;
        }

        .content a:hover {
            text-decoration: underline;
        }

        /* Code Blocks */
        .content pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 16px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .content code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            color: var(--code-text);
        }

        .content pre code {
            padding: 0;
            background: none;
        }

        /* Tables */
        .content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .content th, .content td {
            padding: 12px 16px;
            text-align: left;
            border: 1px solid var(--border);
        }

        .content th {
            background: var(--bg-tertiary);
            font-weight: 600;
            color: var(--text-primary);
        }

        .content td {
            color: var(--text-secondary);
        }

        .content tr:hover td {
            background: var(--bg-secondary);
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            margin-right: 8px;
        }

        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-danger {
            background: #fee2e2;
            color: #991b1b;
        }

        [data-theme="dark"] .badge-success {
            background: #064e3b;
            color: #6ee7b7;
        }

        [data-theme="dark"] .badge-warning {
            background: #78350f;
            color: #fcd34d;
        }

        [data-theme="dark"] .badge-danger {
            background: #7f1d1d;
            color: #fca5a5;
        }

        /* Alerts */
        .alert {
            padding: 16px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            border-left: 4px solid;
        }

        .alert-info {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .alert-success {
            background: #d1fae5;
            border-color: var(--success);
            color: #065f46;
        }

        [data-theme="dark"] .alert-success {
            background: #064e3b;
            color: #6ee7b7;
        }

        /* Quick Start */
        .quickstart {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin: 32px 0;
        }

        .quickstart-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 24px;
            transition: all 0.2s ease;
        }

        .quickstart-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-md);
        }

        .quickstart-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-light);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }

        .quickstart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .quickstart-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .quickstart-link {
            font-size: 14px;
            font-weight: 500;
            color: var(--accent);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .quickstart-link:hover {
            text-decoration: underline;
        }

        /* Mobile Menu Button */
        .mobile-menu-btn {
            display: none;
            width: 40px;
            height: 40px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 90;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
                padding: 24px;
            }

            .mobile-menu-btn {
                display: flex;
            }

            .search-input {
                width: 200px;
            }
        }

        @media (max-width: 640px) {
            .search-container {
                display: none;
            }

            .quickstart {
                grid-template-columns: 1fr;
            }
        }

        /* Keyboard Shortcuts */
        .kbd {
            display: inline-block;
            padding: 2px 6px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
        }

        /* TOC */
        .toc {
            position: sticky;
            top: calc(var(--header-height) + 24px);
            max-height: calc(100vh - var(--header-height) - 48px);
            overflow-y: auto;
            padding-right: 16px;
        }

        .toc-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .toc-list {
            list-style: none;
            padding: 0;
        }

        .toc-item {
            margin-bottom: 8px;
        }

        .toc-link {
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            display: block;
            padding: 4px 0;
            border-left: 2px solid transparent;
            padding-left: 12px;
            transition: all 0.15s ease;
        }

        .toc-link:hover, .toc-link.active {
            color: var(--accent);
            border-left-color: var(--accent);
        }

        .content-wrapper {
            display: flex;
            gap: 48px;
        }

        .content-main {
            flex: 1;
            min-width: 0;
        }

        @media (max-width: 1200px) {
            .content-wrapper {
                flex-direction: column;
            }

            .toc {
                display: none;
            }
        }
    </style>
</head>

        });

        // Show documentation
        function showDoc(docId) {
            currentDoc = docId;
            const content = docs[docId] || '<h1>Page not found</h1>';
            document.getElementById('content').innerHTML = content;

            // Update active sidebar link
            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.classList.remove('active');
                if (link.dataset.doc === docId) {
                    link.classList.add('active');
                }
            });

            // Close mobile sidebar
            document.getElementById('sidebar').classList.remove('open');

            // Scroll to top
            window.scrollTo(0, 0);
        }

        // Toggle theme
        function toggleTheme() {
            isDark = !isDark;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Initialize theme
        function initTheme() {
            const saved = localStorage.getItem('theme');
            isDark = saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        }

        // Toggle sidebar (mobile)
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Search functionality
        function initSearch() {
            const input = document.getElementById('searchInput');
            const results = document.getElementById('searchResults');

            input.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                if (query.length < 2) {
                    results.classList.remove('active');
                    return;
                }

                const matches = searchIndex.filter(item => 
                    item.title.toLowerCase().includes(query) ||
                    item.content.includes(query)
                );

                if (matches.length > 0) {
                    results.innerHTML = matches.slice(0, 8).map(item => `
                        <div class="search-result-item" onclick="showDoc('${item.id}')">
                            <div class="search-result-section">${item.section}</div>
                            <div class="search-result-title">${item.title}</div>
                        </div>
                    `).join('');
                    results.classList.add('active');
                } else {
                    results.innerHTML = '<div class="search-result-item"><div class="search-result-title">No results found</div></div>';
                    results.classList.add('active');
                }
            });

            // Keyboard shortcut
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    input.focus();
                }
                if (e.key === 'Escape') {
                    results.classList.remove('active');
                    input.blur();
                }
            });

            // Close on click outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-container')) {
                    results.classList.remove('active');
                }
            });
        }
