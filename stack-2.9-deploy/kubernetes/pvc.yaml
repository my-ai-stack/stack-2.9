apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stack-2.9-model-cache
  namespace: stack-2.9
  labels:
    app: stack-2.9
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: standard
  # Uncomment for specific storage class (e.g., gp2 on AWS, standard on GKE)
  # storageClassName: gp2
